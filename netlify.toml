[build]
publish = "website"

[[redirects]]
from = "/apps"
to = "/app-store.html"
status = 200

[[redirects]]
from = "/apps/*"
to = "/app-store.html"
status = 200

[[redirects]]
from = "https://apps.roachnet.org/*"
to = "/app-store.html"
status = 200

[[headers]]
for = "/*"

  [headers.values]
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
